input {
  file {
    path => "/app/logs/shard.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => plain
  }
  file {
    path => "/app/logs/shard_security.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => plain
  }
}

filter {
  if [message] =~ /ALERT|Honeypot|WAF|Attack|Deception|🎯/ {
    mutate {
      add_tag => ["alert"]
    }
  }

  grok {
    match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} - %{WORD:component} - %{WORD:level} - %{GREEDYDATA:message}" }
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "shard-logs-%{+YYYY.MM.dd}"
  }

  stdout { codec => rubydebug }
}