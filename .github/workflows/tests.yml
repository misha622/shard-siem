name: SHARD Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest pytest-cov pytest-timeout
          pip install numpy scikit-learn xgboost requests flask
          pip install fastapi uvicorn sqlalchemy bcrypt pydantic pydantic-settings
          pip install plotly aiofiles python-multipart
          pip install pyyaml psutil aiohttp prometheus-client
      - name: Run tests
        run: |
          export PYTHONPATH=${{ github.workspace }}:$PYTHONPATH
          
          # Core module tests
          python3 -m pytest tests/ \
            -v --tb=short \
            --ignore=tests/test_attack_chain.py \
            --ignore=tests/test_baseline_graph.py \
            --ignore=tests/test_compressor_cb.py \
            --ignore=tests/test_dashboard_ext.py \
            --ignore=tests/test_dashboard_full.py \
            --ignore=tests/test_explainer_email.py \
            --ignore=tests/test_honeypot_dashboard.py \
            --ignore=tests/test_ja3.py \
            --ignore=tests/test_notifier_sim.py \
            --ignore=tests/test_ot_iot.py \
            --ignore=tests/test_security.py \
            --ignore=tests/test_security_extended.py \
            --ignore=tests/test_timescale.py \
            --ignore=tests/test_federated.py \
            --ignore=tests/test_siem_storage.py \
            -p no:warnings 2>&1 || true
          
          # DecisionFusion tests
          python3 -m pytest test_fusion.py -v --tb=short 2>&1 || true
          
          # Telegram bot module import test
          python3 -c "from modules.telegram_simple import telegram_bot; print('Telegram bot OK')"
          
          # AppFirewall test
          python3 -c "from modules.app_firewall import app_firewall; print('AppFirewall OK')"
