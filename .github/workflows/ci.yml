name: SHARD CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: shard-siem

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install flake8 pylint python-dateutil pydantic pyyaml
      - name: flake8
        run: flake8 core/ modules/ --max-line-length=120 --exclude=shard_enterprise_complete.py --statistics
        continue-on-error: true
      - name: pylint
        run: pylint core/ modules/ --max-line-length=120 --ignore=shard_enterprise_complete.py --fail-under=7.0
        continue-on-error: true

  test-core:
    name: Core Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y libpcap-dev 2>/dev/null || true
      - name: Install Python deps
        run: |
          pip install --upgrade pip setuptools wheel
          pip install pytest pytest-asyncio pytest-cov pytest-timeout
          pip install python-dateutil pydantic pyyaml cryptography \
            aiofiles psutil aiohttp fastapi uvicorn \
            "python-jose[cryptography]" "passlib[bcrypt]" \
            sqlalchemy asyncpg psycopg2-binary \
            redis prometheus-client python-multipart httpx requests
          pip install scikit-learn numpy pandas xgboost || true
          # Устанавливаем пакет (core/ и modules/ становятся импортируемыми)
          pip install -e . --no-build-isolation
      - name: Run core tests
        run: |
          pip install -e . 2>/dev/null || true
          export PYTHONPATH=${{ github.workspace }}:$PYTHONPATH
          python -c "import sys; sys.path.insert(0, '.'); from core.base import EventBus; print('core OK')"
          pytest tests/ \
            --cov=core --cov=modules \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=30 \
            -v --timeout=60 \
            --ignore=tests/test_timescale.py \
            --ignore=tests/test_federated.py \
            --ignore=tests/test_siem_storage.py \
            -p no:warnings
        env:
          SHARD_CONFIG_SECRET: test-secret-key-for-ci-only
          SHARD_DASHBOARD_PASSWORD: test-password-ci
          SHARD_DASHBOARD_USERNAME: admin
          SHARD_API_KEY: test-api-key-ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  test-webui:
    name: WebUI Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install WebUI deps
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-timeout httpx \
            fastapi uvicorn "python-jose[cryptography]" \
            "passlib[bcrypt]" slowapi python-multipart \
            sqlalchemy aiosqlite pydantic-settings openpyxl
      - name: Run WebUI tests
        working-directory: shard-webui/backend
        run: |
          pip install psutil
          pytest tests/ -v --timeout=30 -p no:warnings
        env:
          SECRET_KEY: test-secret-key-for-ci-only-32chars
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 15
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          HOST: 0.0.0.0
          PORT: 5000
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: test-password-ci

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install bandit
      - name: Bandit scan
        run: |
          bandit -r core/ modules/ -x shard_enterprise_complete.py \
            -ll -f json -o bandit-report.json || true
          bandit -r core/ modules/ -x shard_enterprise_complete.py -ll
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-core, test-webui]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v5
        with:
          context: shard-webui/backend
          push: false
          tags: ${{ env.IMAGE_NAME }}-webui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploy ready — добавь VPS_HOST, VPS_USER, VPS_SSH_KEY в GitHub Secrets"
