name: SHARD CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: shard-siem

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Качество кода
  # ─────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8 pylint python-dateutil pydantic pyyaml

      - name: flake8
        run: |
          flake8 core/ modules/ \
            --max-line-length=120 \
            --exclude=shard_enterprise_complete.py \
            --statistics
        continue-on-error: true

      - name: pylint
        run: |
          pylint core/ modules/ \
            --max-line-length=120 \
            --ignore=shard_enterprise_complete.py \
            --fail-under=7.0
        continue-on-error: true

  # ─────────────────────────────────────────
  # JOB 2: Тесты — ядро системы
  # ─────────────────────────────────────────
  test-core:
    name: Core Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpcap-dev libgeoip-dev 2>/dev/null || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov pytest-timeout
          # Базовые зависимости
          pip install python-dateutil pydantic pyyaml cryptography \
            aiofiles psutil aiohttp fastapi uvicorn \
            "python-jose[cryptography]" "passlib[bcrypt]" \
            sqlalchemy asyncpg "psycopg2-binary" \
            redis prometheus-client \
            python-multipart httpx requests
          # ML-зависимости (опционально — не блокируют если не ставятся)
          pip install scikit-learn numpy pandas || true
          pip install xgboost || true

      - name: Run core tests
        run: |
          pytest tests/ \
            --cov=core \
            --cov=modules \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=40 \
            -v \
            --timeout=60 \
            --ignore=tests/test_timescale.py \
            --ignore=tests/test_federated.py \
            -p no:warnings
        env:
          SHARD_CONFIG_SECRET: test-secret-key-for-ci-only
          SHARD_DASHBOARD_PASSWORD: test-password-ci
          SHARD_DASHBOARD_USERNAME: admin
          SHARD_API_KEY: test-api-key-ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────
  # JOB 3: Тесты — WebUI Backend
  # ─────────────────────────────────────────
  test-webui:
    name: WebUI Backend Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install WebUI dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-timeout httpx \
            fastapi uvicorn "python-jose[cryptography]" \
            "passlib[bcrypt]" slowapi python-multipart \
            sqlalchemy aiosqlite

      - name: Run WebUI tests
        working-directory: shard-webui/backend
        run: |
          pytest tests/ -v --timeout=30 -p no:warnings
        env:
          SECRET_KEY: test-secret-key-for-ci-only-32chars
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 15
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          HOST: 0.0.0.0
          PORT: 5000
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: test-password-ci

  # ─────────────────────────────────────────
  # JOB 4: Security Scan
  # ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit

      - name: Bandit scan
        run: |
          bandit -r core/ modules/ \
            -x shard_enterprise_complete.py \
            -ll \
            -f json \
            -o bandit-report.json || true
          bandit -r core/ modules/ \
            -x shard_enterprise_complete.py \
            -ll
        continue-on-error: true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ─────────────────────────────────────────
  # JOB 5: Docker Build
  # ─────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-core, test-webui]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build SHARD core image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build WebUI image
        uses: docker/build-push-action@v5
        with:
          context: shard-webui/backend
          push: false
          tags: ${{ env.IMAGE_NAME }}-webui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 6: Deploy (ручной запуск)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        # Раскомментировать когда будет VPS:
        # uses: appleboy/ssh-action@v1
        # with:
        #   host: ${{ secrets.VPS_HOST }}
        #   username: ${{ secrets.VPS_USER }}
        #   key: ${{ secrets.VPS_SSH_KEY }}
        #   script: |
        #     cd /opt/shard
        #     git pull origin main
        #     docker compose -f docker-compose.production.yml up -d --remove-orphans
        #     docker system prune -f
        run: echo "Deploy ready — добавь VPS_HOST, VPS_USER, VPS_SSH_KEY в GitHub Secrets"
