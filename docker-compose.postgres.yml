version: '3.8'
services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: shard_siem
      POSTGRES_USER: shard
      POSTGRES_PASSWORD: shard_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shard -d shard_siem"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
