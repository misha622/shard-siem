<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARD - Blocked IPs</title>
    <link rel="icon" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 40 40" width="40" height="40"><polygon points="20,2 38,12 38,28 20,38 2,28 2,12" fill="none" stroke="#00d4ff" stroke-width="2"/><text x="20" y="24" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="bold">S</text></svg>
            <div><div class="nav-title">SHARD Enterprise</div><div class="nav-subtitle">SIEM v5.2.0</div></div>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Dashboard</a>
            <a href="alerts.html" class="nav-link">Alerts</a>
            <a href="blocked.html" class="nav-link active">Blocked IPs</a>
            <a href="map.html" class="nav-link">Map</a>
            <a href="profile.html" class="nav-link">Profile</a>
            <a href="settings.html" class="nav-link" id="settingsLink" style="display:inline-block">Settings</a>
        </div>
        <div class="nav-actions"><span id="usernameDisplay" class="username"></span><button onclick="logout()" class="logout-btn">Sign Out</button></div>
    </nav>
    <main class="main-content">
        <div class="page-header"><h1>🚫 Blocked IPs</h1></div>
        <div class="card">
            <div class="table-container">
                <table class="alerts-table">
                    <thead><tr><th>IP Address</th><th>Reason</th><th>Blocked At</th><th>By</th><th>Expires</th><th>Action</th></tr></thead>
                    <tbody id="blockedTableBody"><tr><td colspan="6">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </main>
<script src="js/utils.js"></script>
    <script>
// auth check in nav.js
const T=localStorage.getItem('access_token');
if(!T)location.href='/login.html';
const H={Authorization:'Bearer '+T};
const user=JSON.parse(localStorage.getItem('user')||'{}');
document.addEventListener('DOMContentLoaded',function(){if(user.role==='admin')document.getElementById('settingsLink').style.display='inline-block';});

async function load(){
    const r=await fetch('/api/blocked/',{headers:H});
    if(!r.ok)return;
    const data=await r.json();
    document.getElementById('blockedTableBody').innerHTML=data.map(b=>`<tr><td><span style="color:#ff4757;font-family:monospace">🚫 ${b.ip_address}</span></td><td>${b.reason}</td><td>${new Date(b.blocked_at).toLocaleString()}</td><td>${b.blocked_by}</td><td>${b.expires_at?new Date(b.expires_at).toLocaleString():'Never'}</td><td>${user.role==='admin'?`<button onclick="unblock('${b.id}')" class="unblock-btn">Unblock</button>`:'-'}</td></tr>`).join('');
}
async function unblock(id){await fetch('/api/blocked/unblock/'+id,{method:'DELETE',headers:H});load();}
function logout(){localStorage.clear();sessionStorage.clear();location.href='/login.html';}
load();
</script>
<!-- nav.js removed, inline auth used -->
</body>
</html>
