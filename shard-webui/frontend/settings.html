<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARD - Settings</title>
    <link rel="icon" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 40 40" width="40" height="40"><polygon points="20,2 38,12 38,28 20,38 2,28 2,12" fill="none" stroke="#00d4ff" stroke-width="2"/><text x="20" y="24" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="bold">S</text></svg>
            <div><div class="nav-title">SHARD Enterprise</div><div class="nav-subtitle">SIEM v5.2.0</div></div>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="alerts.html" class="nav-link">Alerts</a>
            <a href="blocked.html" class="nav-link">Blocked IPs</a>
            <a href="map.html" class="nav-link">Map</a>
            <a href="defense.html" class="nav-link">🛡️ Defense</a>
            <a href="profile.html" class="nav-link">Profile</a>
            <a href="settings.html" class="nav-link active">Settings</a>
        </div>
        <div class="nav-actions"><span id="usernameDisplay" class="username"></span><button onclick="logout()" class="logout-btn">Sign Out</button></div>
    </nav>
    <main class="main-content">
        <h1>⚙️ Settings</h1>
        <div class="charts-grid">
            <div class="card">
                <h3 class="card-title">System Information</h3>
                <div id="sysInfo">Loading...</div>
            </div>
            <div class="card">
                <h3 class="card-title">System Logs</h3>
                <div class="logs-container" id="logsContainer">Loading...</div>
                <button onclick="loadLogs()" class="refresh-btn">🔄 Refresh</button>
            </div>
        </div>
    </main>
<script src="js/utils.js"></script>
    <script>
// auth check in nav.js
const H={Authorization:'Bearer '+T};
const user=JSON.parse(localStorage.getItem('user')||'{}');
// username in nav.js
if(user.role!=='admin')location.href='/index.html';

fetch('/api/settings/system-info',{headers:H}).then(r=>r.json()).then(d=>{
    document.getElementById('sysInfo').innerHTML=`<p>OS: ${d.os}</p><p>Hostname: ${d.hostname}</p><p>CPU Cores: ${d.cpu_count}</p><p>Python: ${d.python_version}</p>`;
});

async function loadLogs(){
    const r=await fetch('/api/settings/logs?lines=50',{headers:H});
    const d=await r.json();
    document.getElementById('logsContainer').innerHTML=(d.logs||[]).map(l=>`<div class="log-entry"><span class="log-time">${new Date(l.timestamp).toLocaleTimeString()}</span> [${l.level}] ${l.message}</div>`).join('');
}
// logout in nav.js
loadLogs();
</script>
</body>
</html>
