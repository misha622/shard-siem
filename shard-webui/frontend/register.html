<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARD - Register</title>
    <link rel="icon" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body{background:linear-gradient(135deg,#0a0e17,#1a1f2b);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Inter,Segoe UI,sans-serif;color:#fff}
        .card{background:rgba(19,26,43,.9);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px;width:460px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
        h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#00d4ff,#09c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
        .ver{color:rgba(255,255,255,.5);text-align:center;font-size:12px;margin-bottom:24px}
        .step-dots{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
        .step-dot{width:32px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;transition:.3s}
        .step-dot.active{background:#00d4ff;box-shadow:0 0 8px rgba(0,212,255,.4)}
        .step-dot.done{background:#2ed573}
        .step{display:none;animation:fadeSlide .3s}
        .step.active{display:block}
        @keyframes fadeSlide{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:12px;color:rgba(255,255,255,.5);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
        .form-group input{width:100%;padding:11px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;font-size:16px}
        .form-group input:focus{outline:none;border-color:#00d4ff}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
        .btn-primary{background:linear-gradient(135deg,#00d4ff,#09c);color:#000}
        .btn-outline{background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);margin-top:10px}
        .err{color:#ff4757;text-align:center;margin-bottom:12px;display:none;font-size:13px}
        .captcha-box{background:rgba(0,212,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;text-align:center;margin-bottom:16px}
        .captcha-text{font-size:28px;font-weight:700;letter-spacing:8px;color:#00d4ff;font-family:monospace;margin-bottom:8px;user-select:none}
        .captcha-input{text-align:center;font-size:18px;letter-spacing:4px}
        .link{text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,.3)}
        .link a{color:#00d4ff;text-decoration:none}
        .honeypot{position:absolute;left:-9999px;opacity:0}
    </style>
</head>
<body>
<div class="card">
    <h1>SHARD Enterprise</h1>
    <div class="ver">SIEM v5.2.0 — Create Account</div>
    <div class="step-dots"><div class="step-dot active" id="d1"></div><div class="step-dot" id="d2"></div><div class="step-dot" id="d3"></div></div>
    <div class="err" id="err"></div>
    <form id="step1" class="step active">
        <div class="form-group"><label>Username</label><input id="u" placeholder="Min 4 characters" minlength="4" required></div>
        <div class="form-row"><div class="form-group"><label>First Name</label><input id="fn"></div><div class="form-group"><label>Last Name</label><input id="ln"></div></div>
        <div class="form-group"><label>Email</label><input id="em" type="email" placeholder="you@example.com"></div>
        <div class="form-group"><label>Password</label><input id="pw" type="password" placeholder="Min 8 chars, uppercase, number, symbol" minlength="8"></div>
        <input type="text" class="honeypot" name="website" tabindex="-1" autocomplete="off">
        <div class="captcha-box">
            <p style="font-size:11px;color:rgba(255,255,255,.3);margin-bottom:8px">🤖 Prove you're human</p>
            <div class="captcha-text" id="captchaText"></div>
            <input type="text" class="captcha-input" id="captchaInput" placeholder="Enter code" maxlength="6" autocomplete="off">
        </div>
        <button type="button" class="btn btn-primary" onclick="nextStep()">Continue →</button>
    </form>
    <form id="step2" class="step">
        <h3 style="margin-bottom:12px">📧 Verify Email</h3>
        <p style="color:rgba(255,255,255,.5);font-size:13px;margin-bottom:16px">Code sent to <strong id="emailDisplay"></strong></p>
        <div class="form-group"><input id="code" placeholder="000000" maxlength="6" style="text-align:center;font-size:24px;letter-spacing:8px"></div>
        <button type="button" class="btn btn-primary" onclick="verifyEmail()">✅ Verify</button>
        <button type="button" class="btn btn-outline" onclick="prevStep()">← Back</button>
    </form>
    <form id="step3" class="step">
        <h3 style="margin-bottom:12px">📋 Almost Done!</h3>
        <div style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;margin-bottom:16px;font-size:11px;color:rgba(255,255,255,.4);max-height:150px;overflow-y:auto">
            <strong style="color:#fff">Terms of Service:</strong><br>
            By creating an account you agree to use this software for legitimate security purposes only.
        </div>
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;color:rgba(255,255,255,.5);cursor:pointer">
            <input type="checkbox" id="agree" style="accent-color:#00d4ff"> I accept the Terms of Service
        </label>
        <button type="button" class="btn btn-primary" onclick="register()">🎉 Create Account</button>
        <button type="button" class="btn btn-outline" onclick="prevStep()">← Back</button>
    </form>
    <div class="link">Already have account? <a href="login.html">Sign In</a></div>
</div>
<script src="js/utils.js"></script>
    <script>
let captcha='',step=1;
function genCaptcha(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';captcha='';for(let i=0;i<6;i++)captcha+=c[Math.floor(Math.random()*c.length)];document.getElementById('captchaText').textContent=captcha}
genCaptcha();
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block'}
function nextStep(){
    const u=document.getElementById('u').value.trim(),fn=document.getElementById('fn').value.trim(),ln=document.getElementById('ln').value.trim(),em=document.getElementById('em').value.trim(),pw=document.getElementById('pw').value,cap=document.getElementById('captchaInput').value.trim(),hp=document.querySelector('.honeypot').value;
    if(!u||!fn||!ln||!em||!pw)return showErr('Fill all fields');
    if(u.length<4)return showErr('Username: min 4 characters');
    if(pw.length<8||!/[A-Z]/.test(pw)||!/\d/.test(pw)||!/[^A-Za-z0-9]/.test(pw))return showErr('Password: 8+ chars, uppercase, number, symbol');
    if(cap.toUpperCase()!==captcha)return showErr('Wrong CAPTCHA');
    if(hp)return showErr('Bot detected');
    document.getElementById('emailDisplay').textContent=em;
    document.getElementById('step1').classList.remove('active');document.getElementById('step2').classList.add('active');
    document.getElementById('d1').classList.remove('active');document.getElementById('d1').classList.add('done');document.getElementById('d2').classList.add('active');step=2;
}
function prevStep(){
    document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
    document.getElementById('step'+(step-1)).classList.add('active');
    document.getElementById('d'+(step-1)).classList.add('active');document.getElementById('d'+step).classList.remove('active');step--;
}
function verifyEmail(){
    document.getElementById('step2').classList.remove('active');document.getElementById('step3').classList.add('active');
    document.getElementById('d2').classList.remove('active');document.getElementById('d2').classList.add('done');document.getElementById('d3').classList.add('active');step=3;
}
async function register(){
    if(!document.getElementById('agree').checked)return showErr('Accept Terms of Service');
    try{
        const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('u').value.trim(),first_name:document.getElementById('fn').value.trim(),last_name:document.getElementById('ln').value.trim(),email:document.getElementById('em').value.trim(),password:document.getElementById('pw').value,company:'',job_title:'',reason:'',agree_updates:false})});
        const d=await r.json();
        if(!r.ok)throw new Error(d.detail||'Error');
        alert('Account created! Redirecting to login...');
        window.location.href='login.html';
    }catch(e){showErr(e.message)}
}
</script>
</body>
</html>
