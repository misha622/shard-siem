<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARD Enterprise SIEM - Login</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f2b 50%, #0a0e17 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }
        .login-container { width: 100%; max-width: 420px; padding: 20px; }
        .login-card {
            background: rgba(19, 26, 43, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .logo .version { font-size: 12px; color: rgba(255, 255, 255, 0.5); margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: rgba(255, 255, 255, 0.7); }
        .form-group input {
            width: 100%; padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px; color: #ffffff; font-size: 16px; font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-group input:focus { outline: none; border-color: #00d4ff; box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1); }
        .login-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none; border-radius: 10px; color: #0a0e17;
            font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit;
            transition: all 0.3s ease;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .error-message {
            background: rgba(255, 71, 87, 0.1); border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 8px; padding: 12px; margin-bottom: 20px; color: #ff4757;
            font-size: 14px; display: none;
        }
        .error-message.show { display: block; animation: shake 0.5s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); }
        }
        .footer-text { margin-top: 20px; text-align: center; font-size: 12px; color: rgba(255, 255, 255, 0.3); }
        .footer-text a { color: #00d4ff; text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>SHARD Enterprise</h1>
                <div class="version">SIEM v5.2.0</div>
            </div>
            <div id="error" class="error-message"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
            </form>
            <div class="footer-text">
                🚀 No account? <a href="/register.html">Create one</a><br><br>
                Protected by SHARD Security Systems
            </div>
        </div>
    </div>
    <script src="js/utils.js"></script>
    <script>
    if (localStorage.getItem('darkMode') === '0') { document.documentElement.classList.add('light-mode'); }
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errDiv = document.getElementById('error');
            
            btn.disabled = true;
            btn.textContent = 'Signing In...';
            errDiv.classList.remove('show');
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');
                
                // СОХРАНЯЕМ ТОКЕН ПРАВИЛЬНО
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                window.location.href = '/dashboard.html';
            } catch(e) {
                errDiv.textContent = e.message;
                errDiv.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }
        
        // Auto-redirect removed to prevent flickering
    </script>
</body>
</html>
