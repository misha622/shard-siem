<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARD - Attack Map</title>
    <link rel="icon" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>#map{height:calc(100vh - 140px);border-radius:12px;border:1px solid var(--border)}</style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 40 40" width="40" height="40"><polygon points="20,2 38,12 38,28 20,38 2,28 2,12" fill="none" stroke="#00d4ff" stroke-width="2"/><text x="20" y="24" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="bold">S</text></svg>
            <div><div class="nav-title">SHARD Enterprise</div><div class="nav-subtitle">SIEM v5.2.0</div></div>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="alerts.html" class="nav-link">Alerts</a>
            <a href="blocked.html" class="nav-link">Blocked IPs</a>
            <a href="map.html" class="nav-link active">Map</a>
            <a href="profile.html" class="nav-link">Profile</a>
            <a href="settings.html" class="nav-link" id="settingsLink" style="display:none">Settings</a>
        </div>
        <div class="nav-actions"><span id="usernameDisplay" class="username"></span><button onclick="logout()" class="logout-btn">Sign Out</button></div>
    </nav>
    <main class="main-content"><div id="map"></div></main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/utils.js"></script>
    <script>
// auth check in nav.js
const H={Authorization:'Bearer '+T};
const user=JSON.parse(localStorage.getItem('user')||'{}');
// username in nav.js
// settingsLink in nav.js

const map=L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
const colors={CRITICAL:'#ff4757',HIGH:'#ffa502',MEDIUM:'#ffd700',LOW:'#2ed573'};

async function load(){
    const r=await fetch('/api/alerts/?page_size=100',{headers:H});
    const d=await r.json();
    map.eachLayer(l=>{if(l instanceof L.CircleMarker)map.removeLayer(l);});
    (d.alerts||[]).forEach(a=>{
        if(a.source_lat&&a.source_lon){
            L.circleMarker([a.source_lat,a.source_lon],{radius:6,fillColor:colors[a.severity]||'#00d4ff',color:'#fff',weight:1,fillOpacity:.8})
            .bindPopup(`<b>${a.severity}: ${a.alert_type}</b><br>IP: ${a.source_ip}<br>${a.source_city||''}, ${a.source_country||''}<br>Score: ${a.threat_score}`).addTo(map);
        }
    });
}
// logout in nav.js
load();setInterval(load,15000);
</script>
</body>
</html>
