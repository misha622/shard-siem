<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARD Enterprise SIEM</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 40 40" width="40" height="40">
                <polygon points="20,2 38,12 38,28 20,38 2,28 2,12" fill="none" stroke="#00d4ff" stroke-width="2"/>
                <text x="20" y="24" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="bold">S</text>
            </svg>
            <div><div class="nav-title">SHARD Enterprise</div><div class="nav-subtitle">SIEM v5.2.0</div></div>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link active">Dashboard</a>
            <a href="/alerts.html" class="nav-link">Alerts</a>
            <a href="/blocked.html" class="nav-link">Blocked IPs</a>
            <a href="/profile.html" class="nav-link">Profile</a><a href="/settings.html" class="nav-link" id="settingsLink" style="display:none">Settings</a>
        </div>
        <div class="nav-actions">
            <div class="status-indicator"><div class="status-dot" id="wsDot"></div></div>
            <span id="usernameDisplay" class="username"></span>
            <button onclick="logout()" class="logout-btn">Sign Out</button>
        </div>
    </nav>
    <main class="main-content">
        <div class="kpi-grid">
            <div class="card kpi-card"><div class="kpi-icon" style="background:rgba(0,212,255,0.1)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div><div class="kpi-info"><div class="kpi-label">Packets</div><div class="kpi-value" id="kpiPackets">0</div></div></div>
            <div class="card kpi-card"><div class="kpi-icon" style="background:rgba(255,71,87,0.1)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff4757" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg></div><div class="kpi-info"><div class="kpi-label">Alerts</div><div class="kpi-value" id="kpiAlerts">0</div></div></div>
            <div class="card kpi-card"><div class="kpi-icon" style="background:rgba(255,165,2,0.1)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffa502" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></div><div class="kpi-info"><div class="kpi-label">Blocked</div><div class="kpi-value" id="kpiBlocked">0</div></div></div>
            <div class="card kpi-card"><div class="kpi-icon" style="background:rgba(46,213,115,0.1)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2ed573" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div class="kpi-info"><div class="kpi-label">Threats</div><div class="kpi-value" id="kpiThreats">0</div></div></div>
        </div>
        <div class="charts-grid">
            <div class="card"><h3 class="card-title">Attack Types</h3><div id="attackTypesChart" style="height:350px"></div></div>
            <div class="card"><h3 class="card-title">Alerts (24h)</h3><div id="alertsTimelineChart" style="height:350px"></div></div>
        </div>
        <div class="charts-grid">
            <div class="card"><h3 class="card-title">Top Attackers</h3><div id="topAttackersChart" style="height:350px"></div></div>
            <div class="card"><h3 class="card-title">Top Targets</h3><div id="topTargetsChart" style="height:350px"></div></div>
        </div>
        <div class="charts-grid">
            <div class="card">
                <h3 class="card-title">System</h3>
                <div class="system-metrics">
                    <div class="metric-item"><div class="metric-header"><span>CPU</span><span id="cpuValue">0%</span></div><div class="progress-bar"><div class="progress-fill cpu-fill" id="cpuBar" style="width:0%"></div></div></div>
                    <div class="metric-item"><div class="metric-header"><span>RAM</span><span id="ramValue">0%</span></div><div class="progress-bar"><div class="progress-fill ram-fill" id="ramBar" style="width:0%"></div></div></div>
                    <div class="metric-item"><div class="metric-header"><span>Disk</span><span id="diskValue">0%</span></div><div class="progress-bar"><div class="progress-fill disk-fill" id="diskBar" style="width:0%"></div></div></div>
                    <div class="metric-item"><div class="metric-header"><span>Uptime</span><span id="uptimeValue">0h</span></div></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h3 class="card-title">Recent Alerts</h3><input type="text" id="alertSearch" placeholder="Search..." class="search-input" oninput="debounceSearch()"></div>
                <div class="table-container"><table class="alerts-table"><thead><tr><th>Time</th><th>Type</th><th>Severity</th><th>Source</th><th>Target</th><th>Action</th></tr></thead><tbody id="alertsTableBody"></tbody></table></div>
            </div>
        </div>
    </main>
    <div id="toastContainer" class="toast-container"></div>
    <script>
        const API = '/api';
        const token = localStorage.getItem('access_token');
        if(!token) location.href='/login.html';
        const user = JSON.parse(localStorage.getItem('user')||'{}');
        document.getElementById('usernameDisplay').textContent=user.username||'';
        if(user.role==='admin') document.getElementById('settingsLink').style.display='inline-block';

        const headers = () => ({'Authorization':'Bearer '+localStorage.getItem('access_token'),'Content-Type':'application/json'});

        async function apiGet(url) {
            const r = await fetch(API+url,{headers:headers()});
            if(r.status===401){localStorage.clear();location.href='/login.html';}
            return r.json();
        }

        // KPI
        async function loadStats(){
            const s = await apiGet('/stats/dashboard');
            document.getElementById('kpiPackets').textContent = s.total_packets;
            document.getElementById('kpiAlerts').textContent = s.total_alerts;
            document.getElementById('kpiBlocked').textContent = s.total_blocked;
            document.getElementById('kpiThreats').textContent = s.active_threats;
            // Charts
            Plotly.react('attackTypesChart', [{values:Object.values(s.alerts_by_type),labels:Object.keys(s.alerts_by_type),type:'pie',hole:.4,marker:{colors:['#00d4ff','#ff4757','#ffa502','#2ed573','#a29bfe','#fd79a8','#00cec9','#fdcb6e','#6c5ce7','#e17055']}}], {paper_bgcolor:'transparent',plot_bgcolor:'transparent',font:{color:'#fff'},margin:{t:10,b:10}});
            const hours = Array.from({length:24},(_,i)=>`${String(i).padStart(2,'0')}:00`);
            Plotly.react('alertsTimelineChart', [{x:hours,y:hours.map(h=>s.alerts_by_hour[h]||0),type:'scatter',mode:'lines+markers',line:{color:'#00d4ff',width:2},fill:'tozeroy',fillcolor:'rgba(0,212,255,0.1)'}], {paper_bgcolor:'transparent',plot_bgcolor:'transparent',font:{color:'#fff'},margin:{t:10,b:40}});
            Plotly.react('topAttackersChart', [{y:s.top_attackers.map(a=>a.ip).reverse(),x:s.top_attackers.map(a=>a.count).reverse(),type:'bar',orientation:'h',marker:{color:'#ff4757'}}], {paper_bgcolor:'transparent',plot_bgcolor:'transparent',font:{color:'#fff'},margin:{t:10,l:150}});
            Plotly.react('topTargetsChart', [{y:s.top_targets.map(a=>a.ip).reverse(),x:s.top_targets.map(a=>a.count).reverse(),type:'bar',orientation:'h',marker:{color:'#00d4ff'}}], {paper_bgcolor:'transparent',plot_bgcolor:'transparent',font:{color:'#fff'},margin:{t:10,l:150}});
        }

        async function loadSystem(){
            const m = await apiGet('/stats/system');
            document.getElementById('cpuValue').textContent=m.cpu_percent.toFixed(1)+'%';
            document.getElementById('cpuBar').style.width=m.cpu_percent+'%';
            document.getElementById('ramValue').textContent=m.memory_percent.toFixed(1)+'%';
            document.getElementById('ramBar').style.width=m.memory_percent+'%';
            document.getElementById('diskValue').textContent=m.disk_percent.toFixed(1)+'%';
            document.getElementById('diskBar').style.width=m.disk_percent+'%';
            document.getElementById('uptimeValue').textContent=m.uptime_hours.toFixed(0)+'h';
        }

        async function loadAlerts(){
            const q = document.getElementById('alertSearch').value;
            const a = await apiGet('/alerts/?page_size=50'+(q?'&search='+encodeURIComponent(q):''));
            const tbody = document.getElementById('alertsTableBody');
            tbody.innerHTML = a.alerts.map(a=>`<tr class="severity-${a.severity.toLowerCase()}"><td>${new Date(a.timestamp).toLocaleTimeString()}</td><td><span class="alert-type-badge">${a.alert_type}</span></td><td><span class="severity-badge severity-${a.severity.toLowerCase()}">${a.severity}</span></td><td>${a.source_ip}</td><td>${a.destination_ip}</td><td>${a.is_blocked?'<span class="blocked-badge">Blocked</span>':`<button onclick="blockIP('${a.id}')" class="block-btn">Block</button>`}</td></tr>`).join('');
        }

        async function blockIP(id){
            await fetch(API+'/alerts/'+id+'/block',{method:'POST',headers:headers()});
            toast('IP blocked','success');
            loadAlerts();loadStats();
        }

        // WebSocket
        function connectWS(){
            const ws = new WebSocket('ws://127.0.0.1:8000/ws?token='+token);
            ws.onopen = () => document.getElementById('wsDot').className='status-dot online pulse';
            ws.onclose = () => {document.getElementById('wsDot').className='status-dot offline';setTimeout(connectWS,3000);};
            ws.onmessage = (e) => {
                const m = JSON.parse(e.data);
                if(m.type==='alert.detected'){
                    toast(`New ${m.data.severity} alert from ${m.data.source_ip}`,'info');
                    loadAlerts();loadStats();
                }
            };
        }

        let searchTO;
        function debounceSearch(){clearTimeout(searchTO);searchTO=setTimeout(loadAlerts,300);}

        function toast(msg,type){
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className='toast toast-'+type;
            t.innerHTML=`<span>${msg}</span>`;
            c.appendChild(t);
            setTimeout(()=>t.classList.add('show'),10);
            setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},5000);
        }

        function logout(){localStorage.clear();location.href='/login.html';}

        loadStats();loadSystem();loadAlerts();connectWS();
        setInterval(loadStats,3000);
        setInterval(loadSystem,5000);
        setInterval(loadAlerts,10000);
    </script>
</body>
</html>
