<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARD - Blocked IPs</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 40 40" width="40" height="40"><polygon points="20,2 38,12 38,28 20,38 2,28 2,12" fill="none" stroke="#00d4ff" stroke-width="2"/><text x="20" y="24" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="bold">S</text></svg>
            <div><div class="nav-title">SHARD Enterprise</div><div class="nav-subtitle">SIEM v5.2.0</div></div>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/alerts.html" class="nav-link">Alerts</a>
            <a href="/blocked.html" class="nav-link active">Blocked IPs</a>
            <a href="/profile.html" class="nav-link">Profile</a><a href="/settings.html" class="nav-link" id="settingsLink" style="display:none">Settings</a>
        </div>
        <div class="nav-actions"><span id="usernameDisplay" class="username"></span><button onclick="logout()" class="logout-btn">Sign Out</button></div>
    </nav>
    <main class="main-content">
        <div class="page-header"><h1>Blocked IPs</h1><button onclick="showBlockForm()" class="add-block-btn">+ Block IP</button></div>
        <div id="blockModal" class="modal" style="display:none">
            <div class="modal-content">
                <div class="modal-header"><h2>Block IP</h2><button onclick="hideBlockForm()" class="modal-close">&times;</button></div>
                <form onsubmit="submitBlock(event)">
                    <div class="form-group"><label>IP Address</label><input type="text" id="blockIP" required class="form-input" pattern="^(\d{1,3}\.){3}\d{1,3}$"></div>
                    <div class="form-group"><label>Reason</label><textarea id="blockReason" required class="form-input" rows="3"></textarea></div>
                    <div class="form-group"><label class="checkbox-label"><input type="checkbox" id="permanentBlock"> Permanent</label></div>
                    <div class="form-actions"><button type="button" onclick="hideBlockForm()" class="cancel-btn">Cancel</button><button type="submit" class="submit-btn">Block</button></div>
                </form>
            </div>
        </div>
        <div class="card">
            <div class="table-container"><table class="alerts-table"><thead><tr><th>IP</th><th>Reason</th><th>Blocked At</th><th>By</th><th>Type</th><th>Expires</th><th>Action</th></tr></thead><tbody id="blockedTableBody"></tbody></table></div>
        </div>
    </main>
    <div id="toastContainer" class="toast-container"></div>
    <script src="js/utils.js"></script>
    <script>
        const API='/api';const token=localStorage.getItem('access_token');if(!token)location.href='/login.html';
        const user=JSON.parse(localStorage.getItem('user')||'{}');document.getElementById('usernameDisplay').textContent=user.username||'';
        if(user.role==='admin')document.getElementById('settingsLink').style.display='inline-block';
        const H=()=>({'Authorization':'Bearer '+token,'Content-Type':'application/json'});
        async function loadBlocked(){
            const r=await fetch(API+'/blocked/',{headers:H()});const d=await r.json();
            document.getElementById('blockedTableBody').innerHTML=d.map(b=>`<tr><td><span class="blocked-ip">${b.ip_address}</span></td><td>${b.reason}</td><td>${new Date(b.blocked_at).toLocaleString()}</td><td>${b.blocked_by}</td><td>${b.is_permanent?'<span class="badge-permanent">Permanent</span>':'<span class="badge-temporary">Temporary</span>'}</td><td>${b.expires_at?new Date(b.expires_at).toLocaleString():'Never'}</td><td>${user.role==='admin'?`<button onclick="unblockIP('${b.id}')" class="unblock-btn">Unblock</button>`:'-'}</td></tr>`).join('');
        }
        function showBlockForm(){document.getElementById('blockModal').style.display='flex';}
        function hideBlockForm(){document.getElementById('blockModal').style.display='none';}
        async function submitBlock(e){
            e.preventDefault();
            await fetch(API+'/blocked/block',{method:'POST',headers:H(),body:JSON.stringify({ip_address:document.getElementById('blockIP').value,reason:document.getElementById('blockReason').value,is_permanent:document.getElementById('permanentBlock').checked})});
            hideBlockForm();toast('Blocked','success');loadBlocked();
        }
        async function unblockIP(id){await fetch(API+'/blocked/unblock/'+id,{method:'DELETE',headers:H()});toast('Unblocked','success');loadBlocked();}
        function toast(m,t){const c=document.getElementById('toastContainer');const e=document.createElement('div');e.className='toast toast-'+t;e.innerHTML='<span>'+m+'</span>';c.appendChild(e);setTimeout(()=>e.classList.add('show'),10);setTimeout(()=>{e.classList.remove('show');setTimeout(()=>e.remove(),300);},5000);}
        function logout(){localStorage.clear();location.href='/login.html';}
        window.onclick=(e)=>{if(e.target===document.getElementById('blockModal'))hideBlockForm();};
        loadBlocked();setInterval(loadBlocked,10000);
    </script>
</body>
</html>
