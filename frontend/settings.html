<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARD - Settings</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 40 40" width="40" height="40"><polygon points="20,2 38,12 38,28 20,38 2,28 2,12" fill="none" stroke="#00d4ff" stroke-width="2"/><text x="20" y="24" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="bold">S</text></svg>
            <div><div class="nav-title">SHARD Enterprise</div><div class="nav-subtitle">SIEM v5.2.0</div></div>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/alerts.html" class="nav-link">Alerts</a>
            <a href="/blocked.html" class="nav-link">Blocked IPs</a>
            <a href="/settings.html" class="nav-link active">Settings</a>
        </div>
        <div class="nav-actions"><span id="usernameDisplay" class="username"></span><button onclick="logout()" class="logout-btn">Sign Out</button></div>
    </nav>
    <main class="main-content">
        <h1>Settings</h1>
        <div class="settings-grid">
            <div class="card">
                <h3 class="card-title">Change Password</h3>
                <form onsubmit="changePassword(event)">
                    <div class="form-group"><label>Current Password</label><input type="password" id="oldPassword" required class="form-input"></div>
                    <div class="form-group"><label>New Password</label><input type="password" id="newPassword" required minlength="8" class="form-input"></div>
                    <button type="submit" class="submit-btn">Update</button>
                </form>
            </div>
            <div class="card">
                <h3 class="card-title">Account</h3>
                <div class="info-grid"><div class="info-item"><div class="info-label">Username</div><div class="info-value" id="infoUsername">-</div></div><div class="info-item"><div class="info-label">Role</div><div class="info-value" id="infoRole">-</div></div></div>
            </div>
            <div class="card" id="logsCard">
                <h3 class="card-title">System Logs</h3>
                <div class="logs-container" id="logsContainer">Loading...</div>
                <button onclick="loadLogs()" class="refresh-btn">Refresh</button>
            </div>
        </div>
    </main>
    <div id="toastContainer" class="toast-container"></div>
    <script>
        const API='/api';const token=localStorage.getItem('access_token');if(!token)location.href='/login.html';
        const user=JSON.parse(localStorage.getItem('user')||'{}');document.getElementById('usernameDisplay').textContent=user.username||'';
        if(user.role!=='admin')location.href='/';
        const H=()=>({'Authorization':'Bearer '+token,'Content-Type':'application/json'});
        fetch(API+'/auth/me',{headers:H()}).then(r=>r.json()).then(u=>{document.getElementById('infoUsername').textContent=u.username;document.getElementById('infoRole').textContent=u.role;});
        async function changePassword(e){
            e.preventDefault();
            const o=document.getElementById('oldPassword').value,n=document.getElementById('newPassword').value;
            await fetch(API+'/auth/change-password',{method:'POST',headers:H(),body:JSON.stringify({old_password:o,new_password:n})});
            toast('Password changed','success');
        }
        async function loadLogs(){
            const r=await fetch(API+'/settings/logs',{headers:H()});const d=await r.json();
            document.getElementById('logsContainer').innerHTML=d.logs.map(l=>`<div class="log-entry log-${l.level.toLowerCase()}"><span class="log-time">${new Date(l.timestamp).toLocaleTimeString()}</span><span class="log-level">[${l.level}]</span><span>${l.message}</span></div>`).join('');
        }
        function toast(m,t){const c=document.getElementById('toastContainer');const e=document.createElement('div');e.className='toast toast-'+t;e.innerHTML='<span>'+m+'</span>';c.appendChild(e);setTimeout(()=>e.classList.add('show'),10);setTimeout(()=>{e.classList.remove('show');setTimeout(()=>e.remove(),300);},5000);}
        function logout(){localStorage.clear();location.href='/login.html';}
        loadLogs();
    </script>
</body>
</html>
