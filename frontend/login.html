<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARD Enterprise SIEM - Login</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a0e17 0%,#1a1f2b 50%,#0a0e17 100%);}
        .login-card{background:rgba(19,26,43,0.9);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:40px;width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
        .logo h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#00d4ff,#0099cc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;}
        .version{text-align:center;color:rgba(255,255,255,0.5);font-size:12px;margin-bottom:30px;}
        input{width:100%;padding:12px;margin-bottom:16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:16px;box-sizing:border-box;}
        input:focus{outline:none;border-color:#00d4ff;}
        button{width:100%;padding:14px;background:linear-gradient(135deg,#00d4ff,#0099cc);border:none;border-radius:10px;color:#0a0e17;font-size:16px;font-weight:600;cursor:pointer;}
        #error{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);border-radius:8px;padding:12px;margin-bottom:16px;color:#ff4757;font-size:14px;display:none;}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><h1>SHARD Enterprise</h1><div class="version">SIEM v5.2.0</div></div>
        <div id="error"></div>
        <form onsubmit="login(event)">
            <input type="text" id="username" placeholder="Username" required autocomplete="username">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            <button type="submit">Sign In</button>
        </form><div style="text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,0.5)">No account? <a href="/register.html" style="color:#00d4ff;text-decoration:none">Create one</a></div>
    </div>
    <script>
        if(localStorage.getItem('access_token'))location.href='/';
        async function login(e){
            e.preventDefault();
            const err=document.getElementById('error');err.style.display='none';
            try{
                const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value})});
                const d=await r.json();
                if(!r.ok)throw new Error(d.detail||'Login failed');
                localStorage.setItem('access_token',d.access_token);
                localStorage.setItem('refresh_token',d.refresh_token);
                localStorage.setItem('user',JSON.stringify(d.user));
                location.href='/';
            }catch(e){err.textContent=e.message;err.style.display='block';}
        }
    </script>
</body>
</html>
